use_default_settings: true

server:
  secret_key: "my-local-dev-key"

search:
  formats:
    - html
    - json
  safe_search: 0

botdetection:
  ip_limit:
    enabled: false
  ip_lists:
    block_ip: []
  link_token: false

engines:
  - name: google
    disabled: false

  - name: duckduckgo
    disabled: false

  - name: startpage
    disabled: false

  - name: brave
    disabled: true